name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf jq

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências do frontend
        run: npm install

      - name: Type-check + build do frontend
        run: npm run build

      - name: Gerar ícones do app
        run: npm run tauri icon build/icon.png

      - name: Baixar Pandoc e Typst (sidecars)
        run: bash scripts/ci/fetch-sidecars-linux.sh

      - name: Smoke test do pipeline de exportação (Pandoc + Typst)
        run: |
          TARGET=$(rustc -vV | grep 'host:' | sed 's/host: //')
          bash scripts/smoke-test-export.sh "src-tauri/binaries/pandoc-$TARGET" "src-tauri/binaries/typst-$TARGET"

      - name: cargo check
        working-directory: src-tauri
        run: cargo check
