name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a criar/publicar (ex: v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  versao:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Conferir se a tag corresponde à versão do produto
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          CARGO_VER=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          PKG_VER=$(jq -r .version package.json)
          echo "tag=$TAG | Cargo.toml=$CARGO_VER | package.json=$PKG_VER"
          if [ "$TAG" != "v$CARGO_VER" ] || [ "$CARGO_VER" != "$PKG_VER" ]; then
            echo "::error::Versao incoerente — tag ($TAG), Cargo.toml ($CARGO_VER) e package.json ($PKG_VER) precisam corresponder."
            exit 1
          fi

  smoke-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Baixar Pandoc e Typst (sidecars)
        run: bash scripts/ci/fetch-sidecars-linux.sh

      - name: Smoke test do pipeline de exportação (Pandoc + Typst)
        run: |
          TARGET=$(rustc -vV | grep 'host:' | sed 's/host: //')
          bash scripts/smoke-test-export.sh "src-tauri/binaries/pandoc-$TARGET" "src-tauri/binaries/typst-$TARGET"

  build:
    needs: [versao, smoke-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências do sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf file build-essential curl wget jq

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências do frontend
        run: npm install

      - name: Gerar ícones do app
        run: npm run tauri icon build/icon.png

      - name: Baixar Pandoc e Typst (sidecars) — Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: bash scripts/ci/fetch-sidecars-linux.sh

      - name: Baixar Pandoc e Typst (sidecars) — Windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: scripts/ci/fetch-sidecars-windows.ps1

      - name: Determinar tag/versão
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + release via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "Markforge ${{ steps.version.outputs.tag }}"
          releaseBody: |
            Build automático do Markforge para Windows e Linux.

            Pandoc e Typst já vêm embutidos no instalador — não é preciso
            instalar nada separadamente para exportar DOCX/PDF.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
